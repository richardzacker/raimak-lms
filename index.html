<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Raimak Lead Management System" />
    <title>Raimak LMS</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
  </head>
  <body>
    <div id="login-view" class="login-screen" style="display: none">
      <div class="login-card">
        <div class="login-logo"><img src="Raimak.png" alt="Raimak" /></div>
        <h1>Lead Management</h1>
        <p>Sign in with your Raimak Microsoft account to access the system.</p>

        <button id="ms-login-btn" class="btn-primary btn-lg">
          <svg
            width="20"
            height="20"
            viewBox="0 0 21 21"
            fill="none"
            style="margin-right: 8px"
          >
            <path
              d="M10 1H1v9h9V1zM20 1h-9v9h9V1zM10 11H1v9h9v-9zM20 11h-9v9h9v-9z"
              fill="currentColor"
            />
          </svg>
          Sign in with Microsoft
        </button>

        <p class="login-version">
          v<span id="app-version-text"></span> · Raimak Leadship
        </p>
      </div>
    </div>

    <div id="app-shell" class="app-shell" style="display: none">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand"><img src="Raimak.png" alt="Raimak" /></div>
        <nav class="sidebar-nav">
          <a
            class="nav-item active"
            data-view="dashboard"
            onclick="navigate('dashboard')"
          >
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24">
              <rect
                x="3"
                y="3"
                width="7"
                height="7"
                rx="1"
                fill="currentColor"
              />
              <rect
                x="14"
                y="3"
                width="7"
                height="7"
                rx="1"
                fill="currentColor"
              />
              <rect
                x="3"
                y="14"
                width="7"
                height="7"
                rx="1"
                fill="currentColor"
              />
              <rect
                x="14"
                y="14"
                width="7"
                height="7"
                rx="1"
                fill="currentColor"
              />
            </svg>
            Dashboard
          </a>
          <a class="nav-item" data-view="myleads" onclick="navigate('myleads')">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24">
              <circle
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="2"
              />
              <polyline
                points="12,6 12,12 16,14"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
            My Leads
          </a>
          <a
            class="nav-item admin-only"
            data-view="drip"
            onclick="navigate('drip')"
          >
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24">
              <path
                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"
                fill="currentColor"
              />
            </svg>
            Drip Feed
          </a>
          <a
            class="nav-item admin-only"
            data-view="assign"
            onclick="navigate('assign')"
          >
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24">
              <path
                d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
              <circle
                cx="9"
                cy="7"
                r="4"
                stroke="currentColor"
                stroke-width="2"
              />
              <line
                x1="19"
                y1="8"
                x2="19"
                y2="14"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
              <line
                x1="22"
                y1="11"
                x2="16"
                y2="11"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
            Assign Leads
          </a>
          <a
            class="nav-item admin-only"
            data-view="report"
            onclick="navigate('report')"
          >
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24">
              <path
                d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
                stroke="currentColor"
                stroke-width="2"
              />
              <polyline
                points="14,2 14,8 20,8"
                stroke="currentColor"
                stroke-width="2"
              />
              <line
                x1="16"
                y1="13"
                x2="8"
                y2="13"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
              <line
                x1="16"
                y1="17"
                x2="8"
                y2="17"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
            Daily Report
          </a>
          <a
            class="nav-item admin-only"
            data-view="leads"
            onclick="navigate('leads')"
          >
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24">
              <path
                d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
              <circle
                cx="9"
                cy="7"
                r="4"
                stroke="currentColor"
                stroke-width="2"
              />
            </svg>
            Leads
            <span class="badge" id="badge-leads"></span>
          </a>
          <a
            class="nav-item admin-only"
            data-view="contractors"
            onclick="navigate('contractors')"
          >
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24">
              <rect
                x="2"
                y="7"
                width="20"
                height="14"
                rx="2"
                stroke="currentColor"
                stroke-width="2"
              />
              <path
                d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"
                stroke="currentColor"
                stroke-width="2"
              />
            </svg>
            Raimak Team
          </a>
          <a
            class="nav-item admin-only"
            data-view="activity"
            onclick="navigate('activity')"
          >
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24">
              <polyline
                points="22,12 18,12 15,21 9,3 6,12 2,12"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            Activity Log
          </a>
        </nav>

        <div class="sidebar-footer">
          <div class="user-info">
            <div class="user-avatar" id="ui-user-initial">U</div>
            <div class="user-meta">
              <span class="user-name" id="ui-user-name">User</span>
              <span class="user-email" id="ui-user-email"
                >email@raimak.com</span
              >
            </div>
          </div>
          <button class="btn-ghost" onclick="Auth.signOut()" title="Sign Out">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24">
              <path
                d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
              <polyline
                points="16,17 21,12 16,7"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <line
                x1="21"
                y1="12"
                x2="9"
                y2="12"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </div>
      </aside>

      <main class="main-content" id="main-content"></main>

      <div class="loading-overlay" id="loading-overlay" style="display: none">
        <div class="spinner"></div>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/graph.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
